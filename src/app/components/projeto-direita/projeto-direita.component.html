<!-- app-projeto-direita.component.html -->
<div class="card-container">
  <article class="card">
    <header class="card-title" *ngIf="title">
      <h3>{{ title }}</h3>
    </header>

    <button *ngIf="showImage && imageUrl" type="button" class="image-btn" (click)="openProjectModal()">
      <img [src]="imageUrl" [alt]="title || 'Imagem do projeto'" loading="lazy" />
    </button>

    <div class="card-content">
      <div class="card-sobre" *ngIf="showDescription && about">
        <p>Sobre</p>
        <h3>{{ about }}</h3>
      </div>

      <div class="card-sobre" *ngIf="showTechnology && technologies">
        <p>Tecnologia</p>
        <h3>{{ technologies }}</h3>
      </div>
    </div>

    <footer class="card-footer" *ngIf="githubLink || pageLink">
      <a *ngIf="githubLink" [href]="githubLink" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a *ngIf="pageLink" [href]="pageLink" target="_blank" rel="noopener noreferrer">Page</a>
    </footer>
  </article>
</div>

<section *ngIf="isProjectModalOpen" class="project-modal" (click)="closeProjectModal()">
  <div class="project-modal-panel" (click)="$event.stopPropagation()">
    <div class="project-modal-header">
      <h3>{{ title }}</h3>
      <button type="button" class="close-btn" (click)="closeProjectModal()">Fechar</button>
    </div>

    <div class="project-modal-body">
      <img *ngIf="showImage && imageUrl" [src]="imageUrl" [alt]="title || 'Imagem do projeto'" />
      <p *ngIf="showDescription && about">{{ about }}</p>
      <p *ngIf="showTechnology && technologies" class="tech">{{ technologies }}</p>
    </div>

    <div class="project-modal-footer">
      <a *ngIf="pageLink" [href]="pageLink" target="_blank" rel="noopener noreferrer">Abrir projeto</a>
      <a *ngIf="githubLink" [href]="githubLink" target="_blank" rel="noopener noreferrer"
        >Abrir repositorio</a
      >
    </div>
  </div>
</section>
