<!-- app-projeto-direita.component.html -->
<div class="card-container">
  <article class="card">
    <header class="card-title" *ngIf="title">
      <h3>{{ title }}</h3>
    </header>

    <img
      *ngIf="imageUrl"
      (click)="openModal(imageUrl)"
      [src]="imageUrl"
      [alt]="title || 'Imagem do projeto'"
      loading="lazy"
    />

    <div class="card-content">
      <div class="card-sobre" *ngIf="about">
        <p>Sobre</p>
        <h3>{{ about }}</h3>
      </div>

      <div class="card-sobre" *ngIf="technologies">
        <p>Tecnologia</p>
        <h3>{{ technologies }}</h3>
      </div>
    </div>

    <footer class="card-footer" *ngIf="githubLink || pageLink">
      <a *ngIf="githubLink" [href]="githubLink" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a *ngIf="pageLink" [href]="pageLink" target="_blank" rel="noopener noreferrer">Page</a>
    </footer>
  </article>
  <app-modal-img
    *ngIf="showFullscreen"
    [fullimag]="true"
    [fullscreenImageUrl]="fullscreenImageUrl"
    (closeModal)="closeModal()"
  ></app-modal-img>
</div>
